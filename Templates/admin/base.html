<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Dashboard{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .logout-link{
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
            text-decoration: none;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 14px;
            margin-top: 16px;
            transition: .25s ease;
        }
        .logout-link:hover{
            background: #e2e8f0;
            color: #0f172a;
        }
    </style>
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div>

            <!-- LOGO -->
            <div class="logo">
                <i class="bi bi-box-seam"></i>
                <div class="logo-text">
                    <h2>Inventaris</h2>
                    <p>Gudang & Transaksi</p>
                </div>
            </div>

            <!-- MENU -->
            <nav class="menu">

                <a href="{{ url_for('dashboard_admin') }}"
                   class="{% if request.endpoint == 'dashboard_admin' %}active{% endif %}">

                    <i class="bi bi-grid"></i>
                    <span>Dashboard</span>
                </a>

                <a href="{{ url_for('data_barang') }}"
                   class="{% if request.endpoint == 'data_barang' %}active{% endif %}">

                    <i class="bi bi-box"></i>
                    <span>Data Barang</span>
                </a>

                <a href="{{ url_for('data_kategori') }}"
                   class="{% if request.endpoint == 'data_kategori' %}active{% endif %}">

                    <i class="bi bi-stars"></i>
                    <span>Kategori</span>
                </a>

                <a href="{{ url_for('data_laporan') }}"
                   class="{% if request.endpoint == 'data_laporan' %}active{% endif %}">

                    <i class="bi bi-table"></i>
                    <span>Laporan</span>
                </a>

                <a href="{{ url_for('data_lokasi') }}"
                   class="{% if request.endpoint == 'data_lokasi' %}active{% endif %}">

                    <i class="bi bi-geo-alt"></i>
                    <span>Lokasi</span>
                </a>

                <a href="{{ url_for('data_petugas') }}"
                   class="{% if request.endpoint == 'data_petugas' %}active{% endif %}">

                    <i class="bi bi-person-workspace"></i>
                    <span>Petugas</span>
                </a>

            </nav>

        </div>

        <!-- ADMIN -->
        <div class="admin">

            <div class="admin-icon">
                <i class="bi bi-person-fill"></i>
            </div>

            <div class="admin-info">
                <h6>Admin</h6>
                <small>Administrator</small>
            </div>

        </div>

        <a href="{{ url_for('logout') }}" class="logout-link">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
        </a>

    </aside>

    <!-- CONTENT -->
    <main class="content">

        {% block content %}
        <!-- isi halaman -->
        {% endblock %}

    </main>

</div>

</body>
</html>
